interface:
  display_name: "疾病领域调研（InnoSight 专用完整版）"
  short_description: "强制调用 InnoSight 的高覆盖创新药疾病领域深度调研"
  default_prompt: "使用 $disease-area-research-innosight 调研我指定的疾病，强制完成 InnoSight 接口发现、schema 读取、完整翻页和执行回执。"
dependencies:
  tools:
    - type: "mcp"
      value: "innosight_mcp"
      description: "必须用于医药管线、临床、流行病学、指南、审批、专利背景和BD交易的结构化检索"
